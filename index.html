<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | AnimeSahil</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0e14] flex items-center justify-center min-h-screen overflow-hidden text-white font-sans">

    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-900/30 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-900/20 blur-[120px] rounded-full"></div>

    <div class="relative z-10 text-center px-6">
        <div class="mb-6 flex justify-center">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl rotate-12 flex items-center justify-center shadow-2xl shadow-indigo-500/50">
                <span class="text-3xl font-black -rotate-12">A</span>
            </div>
        </div>

        <h1 class="text-5xl md:text-7xl font-black mb-4 tracking-tighter italic uppercase">
            Ready to <span class="text-indigo-500">Watch?</span>
        </h1>
        
        <p class="text-gray-400 mb-10 text-lg max-w-md mx-auto">
            Experience the latest anime episodes in high definition. Fast, free, and subbed.
        </p>

        <a href="/anime" class="inline-block group">
            <div class="flex items-center gap-4 bg-white text-black px-10 py-4 rounded-full font-bold text-xl transition-all duration-300 group-hover:bg-indigo-500 group-hover:text-white group-hover:scale-105 active:scale-95 shadow-xl">
                Enter Main Site
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform transition-transform group-hover:translate-x-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
            </div>
        </a>

        <p class="mt-12 text-xs text-gray-600 uppercase tracking-[0.3em]">
            Premium Streaming Experience
        </p>
    </div>

</body>
</html>
