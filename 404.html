<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Lost in the Multiverse</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0e14] text-white font-sans min-h-screen flex items-center justify-center overflow-hidden">

    <div class="absolute inset-0 z-0">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-indigo-600/20 blur-[100px] rounded-full"></div>
        <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-red-600/10 blur-[100px] rounded-full"></div>
    </div>

    <div class="relative z-10 text-center px-4">
        <h1 class="text-[120px] md:text-[200px] font-black leading-none tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-indigo-500 to-gray-800 opacity-80">
            404
        </h1>
        
        <div class="mt-[-20px] md:mt-[-40px]">
            <h2 class="text-2xl md:text-4xl font-bold uppercase tracking-widest italic">
                Episode <span class="text-indigo-500 underline decoration-red-500">Not Found</span>
            </h2>
            <p class="text-gray-500 mt-4 max-w-sm mx-auto text-sm md:text-base">
                Looks like this page was deleted by the villain or never existed in this timeline.
            </p>
        </div>

        <div class="mt-10">
            <a href="/" class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-lg font-black transition-all transform hover:-translate-y-1 active:scale-95 shadow-[0_0_30px_rgba(79,70,229,0.3)]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 14.707a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 1.414L7.414 9H15a1 1 0 110 2H7.414l2.293 2.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
                BACK TO HOME
            </a>
        </div>

        <div class="mt-12 flex justify-center items-center gap-2 text-[10px] text-gray-600 tracking-[0.4em] uppercase">
            <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
            System Error: Portal Closed
        </div>
    </div>

    <div class="absolute inset-0 pointer-events-none opacity-[0.03] bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_2px,3px_100%]"></div>

</body>
</html>
